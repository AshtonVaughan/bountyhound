[pytest]
# Pytest configuration for BountyHound

# Test discovery
python_files = test_*.py *_test.py
python_classes = Test*
python_functions = test_*

# Test paths
testpaths = tests

# Output options
addopts =
    -v
    --strict-markers
    --tb=short
    --cov=engine
    --cov-report=term-missing
    --cov-report=html
    --cov-report=xml
    -ra

# Markers for categorizing tests
markers =
    unit: marks tests as unit tests (fast, isolated)
    integration: marks tests as integration tests (require external services)
    e2e: marks tests as end-to-end tests (full workflow tests)
    slow: marks tests as slow (deselect with '-m "not slow"')
    security: marks tests as security-focused vulnerability tests
    performance: marks tests as performance/benchmark tests
    agent: marks tests as agent-specific tests
    requires_tools: marks tests that require external tools (jadx, strings, etc.)
    windows_only: marks tests that only run on Windows
    unix_only: marks tests that only run on Unix/Linux/macOS
