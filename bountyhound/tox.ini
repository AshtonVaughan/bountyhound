# Tox configuration for BountyHound
# Multi-Python version testing and environment management
# https://tox.readthedocs.io/

[tox]
# Python versions to test against
envlist = py310,py311,py312,lint,type

# Skip missing Python interpreters
skip_missing_interpreters = true

# Minimum tox version
minversion = 4.0

[testenv]
# Install package in development mode
usedevelop = true

# Dependencies for all test environments
deps =
    pytest>=7.4.0
    pytest-cov>=4.1.0
    pytest-xdist>=3.3.0
    pytest-timeout>=2.1.0
    pytest-mock>=3.11.0
    requests>=2.31.0
    responses>=0.23.0

# Commands to run
commands =
    # Run tests with coverage
    pytest {posargs:tests} \
        --cov=engine \
        --cov-report=term-missing \
        --cov-report=html \
        --cov-report=xml \
        -v

# Set environment variables
setenv =
    PYTHONPATH = {toxinidir}
    COVERAGE_FILE = {env:COVERAGE_FILE:.coverage.{envname}}

# Parallel execution
parallel_show_output = true

[testenv:py310]
description = Run tests with Python 3.10
basepython = python3.10

[testenv:py311]
description = Run tests with Python 3.11
basepython = python3.11

[testenv:py312]
description = Run tests with Python 3.12
basepython = python3.12

[testenv:lint]
description = Run linting checks (flake8, black)
skip_install = true
deps =
    flake8>=6.0.0
    flake8-docstrings>=1.7.0
    black>=23.0.0
    isort>=5.12.0
commands =
    flake8 engine/ tests/ agents/ skills/
    black --check engine/ tests/ agents/ skills/
    isort --check-only engine/ tests/ agents/ skills/

[testenv:type]
description = Run type checking (mypy)
deps =
    mypy>=1.5.0
    types-requests
    types-setuptools
commands =
    mypy engine/ --ignore-missing-imports

[testenv:security]
description = Run security checks (bandit)
deps =
    bandit[toml]>=1.7.5
commands =
    bandit -r engine/ -f json -o {toxworkdir}/bandit-report.json
    bandit -r engine/ -f screen

[testenv:coverage]
description = Generate coverage report
deps =
    {[testenv]deps}
    coverage[toml]>=7.3.0
commands =
    coverage erase
    pytest tests/ --cov=engine --cov-report=
    coverage report --fail-under=90
    coverage html

[testenv:fast]
description = Run tests quickly (no coverage, parallel)
commands =
    pytest {posargs:tests} -n auto -x --tb=short

[testenv:unit]
description = Run unit tests only
commands =
    pytest {posargs:tests} -m unit -v

[testenv:integration]
description = Run integration tests only
commands =
    pytest {posargs:tests} -m integration -v

[testenv:e2e]
description = Run end-to-end tests only
commands =
    pytest {posargs:tests} -m e2e -v --timeout=300

[testenv:slow]
description = Run slow tests only
commands =
    pytest {posargs:tests} -m slow -v --timeout=600

[testenv:clean]
description = Clean up temporary files and artifacts
skip_install = true
deps =
allowlist_externals =
    rm
    find
commands =
    rm -rf .tox
    rm -rf .pytest_cache
    rm -rf .coverage*
    rm -rf htmlcov
    rm -rf coverage.xml
    rm -rf *.egg-info
    rm -rf dist
    rm -rf build

[pytest]
# Pytest markers
markers =
    unit: Unit tests (fast, isolated)
    integration: Integration tests (external services)
    e2e: End-to-end tests (full workflows)
    slow: Slow tests (long-running)
    security: Security-focused tests
    performance: Performance/benchmark tests
    agent: Agent-specific tests

[coverage:run]
source = engine
omit =
    */tests/*
    */test_*.py
    */__pycache__/*
branch = true

[coverage:report]
precision = 2
show_missing = true
skip_covered = false

[flake8]
max-line-length = 100
exclude =
    .git,
    __pycache__,
    .tox,
    .eggs,
    *.egg,
    build,
    dist,
    .venv,
    venv
ignore =
    # Line too long (handled by black)
    E501,
    # Line break before binary operator (black compatibility)
    W503,
    # Missing docstring (handled separately)
    D100,D101,D102,D103,D104,D105,D107

[isort]
profile = black
line_length = 100
multi_line_output = 3
include_trailing_comma = true
