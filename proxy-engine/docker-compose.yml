version: "3.8"

services:
  proxy-engine:
    build: .
    ports:
      - "8080:8080"   # Proxy
      - "8187:8187"   # API + Web UI
    environment:
      - PROXY_PORT=8080
      - API_PORT=8187
      - AUTO_SAVE_INTERVAL=300
    volumes:
      - pe-data:/app/projects
      - pe-templates:/app/nuclei-templates
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import httpx; httpx.get('http://localhost:8187/api/status')"]
      interval: 30s
      timeout: 5s
      retries: 3

volumes:
  pe-data:
  pe-templates:
